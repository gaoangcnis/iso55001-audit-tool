question_type_pj: "主观判断。问题的评分基于\"专业判断\"，依照评分原则判断其符合程度。可基于判断，给出零分至满分。"
question_type_xo: "是否判断。问题的回答只有是或者否两种答案，\"是\"得满分，\"否\"不得分。任何活动要得分的话，其至少应到达\"90%符合\"，60%的相关人员理解相关的内容和要求，执行时间不少于三个月。除此之外任何其他情形打零分。"
question_type_pw: "多项选择。当问题含有几个组成部分时，可以得到每一部分得分，总和为最终得分。任何活动要得分的话，其至少应到达\"90%符合\"，60%的相关人员理解相关的内容和要求，执行时间不少于三个月。除此之外任何其他情形打零分。"