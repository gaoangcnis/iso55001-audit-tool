question_type_pj: "Subjective Judgment. The question score is based on \"professional judgment\", judged according to the scoring principles. Scores can range from 0 to full marks based on judgment."
question_type_xo: "Yes/No Judgment. The question has only two answer options: yes or no. A \"yes\" answer gets full marks, and a \"no\" answer gets zero marks. To get any score, the activity must reach at least \"90% compliance\", with 60% of relevant personnel understanding the content and requirements, and implementation time of no less than three months. Otherwise, zero marks are given."
question_type_pw: "Multiple Choice. When a question contains several components, each component can be scored separately, and the sum is the final score. To get any score, the activity must reach at least \"90% compliance\", with 60% of relevant personnel understanding the content and requirements, and implementation time of no less than three months. Otherwise, zero marks are given."